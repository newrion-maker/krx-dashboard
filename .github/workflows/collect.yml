name: 주도 테마 자동 수집

on:
  schedule:
    - cron: '30 0,1,2,3,4,5,6,9 * * 1-5'  # KST 기준 09:30~15:30 매시간 + 18:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv pykrx-openapi openpyxl pandas
      - name: Run collection script
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python collect.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_data.json
          git commit -m "Update market data with sectors" || echo "No changes to commit"
          git push
