name: 주도 테마 자동 수집

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 매일 오후 6시 30분 (한국시간)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv pykrx-openapi openpyxl
      - name: Run collection script
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python collect.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_data.json data.json
          git commit -m "Update market data with sectors" || echo "No changes to commit"
          git push
